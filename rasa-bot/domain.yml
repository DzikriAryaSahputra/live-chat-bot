responses:
  utter_sapaan:
  - text: "Halo!😊 Saya Asisten Virtual BPS. Ada data atau informasi statistik yang bisa saya bantu carikan hari ini?"
  
  utter_tanya_data_statistik:
  - text: "Untuk data statistik terbaru seperti inflasi, kependudukan, atau berita resmi statistik, Anda bisa melihat publikasi langsung di website resmi BPS. Ada indikator spesifik yang sedang Anda cari?"
  
  utter_tanya_profil_bps:
  - text: "Berikut adalah <b>Profil BPS Kota Jambi</b>:<br>Badan Pusat Statistik (BPS) Kota Jambi adalah instansi vertikal BPS yang bertugas melaksanakan kegiatan statistik di wilayah Kota Jambi. BPS Kota Jambi bertanggung jawab langsung kepada BPS Provinsi Jambi dan Kepala BPS Republik Indonesia.<br><br> BPS Kota Jambi menyelenggarakan sensus, survei, pengolahan data statistik, serta mendiseminasikan data dan informasi statistik kepada seluruh lapisan masyarakat, akademisi, dunia usaha, dan pemerintah daerah.<br><br> <i><ul><li>1. Menyelenggarakan kegiatan sensus dan survei di wilayah Kota Jambi</li><li>2. Mengolah dan mempublikasikan data statistik daerah</li><li>3. Melayani kebutuhan data pengguna secara profesional</li><li>4. Membina koordinasi statistik sektoral di Kota Jambi</li></ul></i>..."

  utter_tanya_sensus_ekonomi:
  - text: "Sensus terakhir dilaksanakan pada tahun 2020. Dan untuk tahun ini akan ada sensus ekonomi 2026 (SE2026) yang merupakan sensus ekonomi ke-5 loh🤩. Untuk informasi lebih lanjut mengenai sensus ekonomi, Anda bisa melihat di website resmi BPS."

