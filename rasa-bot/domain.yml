version: "3.1"

intents:
  - sapaan
  - tanya_data_statistik
  - minta_admin
  - cari_info_website
  - sawit
  - tanya_sensus_ekonomi

actions:
  - action_cari_website_bps

responses:
  utter_sapaan:
  - text: "Halo!😊 Saya Asisten Virtual BPS. Ada data atau informasi statistik yang bisa saya bantu carikan hari ini?"
  
  utter_tanya_data_statistik:
  - text: "Untuk data statistik terbaru seperti inflasi, kependudukan, atau berita resmi statistik, Anda bisa melihat publikasi langsung di website resmi BPS. Ada indikator spesifik yang sedang Anda cari?"
  
  utter_tanya_sensus_ekonomi:
  - text: "Sensus terakhir dilaksanakan pada tahun 2020. Dan untuk tahun ini akan ada sensus ekonomi 2026 (SE2026) yang merupakan sensus ekonomi ke-5 loh🤩. Untuk informasi lebih lanjut mengenai sensus ekonomi, Anda bisa melihat di website resmi BPS."

  utter_minta_admin:
  - text: "Baik, mohon tunggu sebentar ya. Sistem sedang meneruskan pesan Anda ke petugas kami. Admin akan segera membalas pesan Anda di sini."

  utter_jawab_sawit:
  - text: "Mungkin. Tapi yang lebih penting… kamu jangan sampai melupakan dirimu sendiri hanya karena mengingat dia. Kamu harus tetap kuat, tetap berdiri, dan terus berjalan maju. Jangan biarkan perasaan ditinggalkan itu membuatmu terpuruk. Kamu punya banyak hal yang bisa kamu capai dan banyak orang yang peduli padamu. Jadi, jangan pernah merasa sendirian, ya!"

session_config:
  session_expiration_time: 60
  carry_over_slots_to_new_session: true