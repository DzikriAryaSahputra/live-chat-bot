  utter_tanya_jumlah_umkm:
    - text: Berdasarkan data BPS Provinsi Jambi tahun 2023, jumlah UMKM di Kota Jambi mencapai <b>46.912</b> usaha, yang terdiri dari Usaha Mikro, Kecil, dan Menengah. UMKM sektor kuliner mendominasi, dengan jumlah pelaku mencapai <b>18.587</b> usaha. Jumlah ini terus tumbuh, didukung oleh peningkatan digitalisasi usaha.<br>Dapat anda baca melalui link berikut:<br><a href="https://jambi.bps.go.id/id/statistics-table/2/MjEzMSMy/jumlah-usaha-mikro-kecil-dan-menengah.html" target="_blank">BPS UMKM JAMBI</a>
