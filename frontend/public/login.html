<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>BPS Messenger - Secure Admin Login</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "outline-variant": "#e2e8f0",
                    "surface-tint": "#f97316",
                    "on-surface-variant": "#64748b",
                    "surface-variant": "#f1f5f9",
                    "on-surface": "#0f172a",
                    "background": "#f8f6f6",
                    "primary": "#f97316",
                    "surface": "#f8f6f6",
                    "outline": "#94a3b8",
            },
            "fontFamily": {
                    "headline": ["Plus Jakarta Sans"],
                    "body": ["Plus Jakarta Sans"],
                    "label": ["Plus Jakarta Sans"]
            }
          },
        },
      }
    </script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8f6f6; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .glass-panel { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px); }
        .primary-gradient { background: linear-gradient(135deg, #fb923c 0%, #f97316 100%); }
        .bento-glow { background: radial-gradient(circle at 50% 0%, rgba(249, 115, 22, 0.03) 0%, transparent 70%); }
    </style>
</head>
<body class="bg-surface text-on-surface min-h-screen flex items-center justify-center overflow-hidden selection:bg-primary/20 selection:text-primary">
    <div class="fixed inset-0 pointer-events-none overflow-hidden">
        <div class="absolute -top-[20%] -left-[10%] w-[60%] h-[60%] rounded-full bg-primary/5 blur-[120px]"></div>
        <div class="absolute -bottom-[10%] -right-[5%] w-[40%] h-[40%] rounded-full bg-primary/5 blur-[100px]"></div>
    </div>
    
    <main class="relative z-10 w-full max-w-md px-4 flex flex-col items-center">
        <div class="mb-6 md:mb-8">
            <div class="flex items-center space-x-3">
                <div class="p-2.5 rounded-xl bg-primary shadow-lg shadow-primary/20">
                    <span class="material-symbols-outlined text-white text-2xl" data-icon="monitoring" style="font-variation-settings: 'FILL' 1;">monitoring</span>
                </div>
                <div class="flex flex-col">
                    <span class="text-primary font-extrabold tracking-tight text-lg md:text-xl leading-none">BPS MONITOR</span>
                    <span class="text-[9px] md:text-[10px] text-on-surface-variant font-bold uppercase tracking-widest mt-1">Live Dashboard</span>
                </div>
            </div>
        </div>

        <div class="w-full relative group">
            <div class="glass-panel border border-slate-200 rounded-2xl p-6 md:p-8 shadow-xl relative overflow-hidden bento-glow">
                
                <div class="mb-6 text-center">
                    <div class="inline-flex items-center space-x-2 px-3 py-1 rounded-full bg-primary/10 border border-primary/10 mb-4">
                        <span class="w-1.5 h-1.5 rounded-full bg-primary animate-pulse"></span>
                        <span class="text-[9px] md:text-[10px] uppercase tracking-widest font-bold text-primary">System Online</span>
                    </div>
                    <h2 class="text-2xl md:text-3xl font-bold tracking-tight text-on-surface">Admin Login</h2>
                    <p class="text-on-surface-variant mt-1.5 text-xs md:text-sm">Enter your credentials to access the secure gateway.</p>
                </div>

                <form id="login-form" class="space-y-4 md:space-y-5">
                    
                    <div id="error-msg" class="hidden bg-red-50 border border-red-200 text-red-600 text-xs font-bold px-3 py-2.5 rounded-xl flex items-center gap-2">
                        <span class="material-symbols-outlined text-[16px]">error</span>
                        <span id="error-text">Username atau password salah!</span>
                    </div>

                    <div class="space-y-1.5">
                        <label class="block text-[10px] font-bold text-on-surface-variant uppercase tracking-widest ml-1" for="username">Username or Email</label>
                        <div class="relative group">
                            <div class="absolute left-4 top-1/2 -translate-y-1/2 pointer-events-none">
                                <span class="material-symbols-outlined text-outline text-lg">alternate_email</span>
                            </div>
                            <input id="username" required class="w-full bg-slate-50 border border-slate-200 rounded-xl py-3 pl-11 pr-4 text-sm text-on-surface placeholder-outline focus:ring-2 focus:ring-primary/20 focus:border-primary/50 focus:bg-white transition-all outline-none" placeholder="admin" type="text" autocomplete="off"/>
                        </div>
                    </div>

                    <div class="space-y-1.5">
                        <div class="flex justify-between items-center px-1">
                            <label class="block text-[10px] font-bold text-on-surface-variant uppercase tracking-widest" for="password">Password</label>
                        </div>
                        <div class="relative group">
                            <div class="absolute left-4 top-1/2 -translate-y-1/2 pointer-events-none">
                                <span class="material-symbols-outlined text-outline text-lg">lock</span>
                            </div>
                            <input id="password" required class="w-full bg-slate-50 border border-slate-200 rounded-xl py-3 pl-11 pr-11 text-sm text-on-surface placeholder-outline focus:ring-2 focus:ring-primary/20 focus:border-primary/50 focus:bg-white transition-all outline-none" placeholder="••••••••••••" type="password"/>
                            <button id="toggle-password" class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-colors" type="button">
                                <span class="material-symbols-outlined text-lg">visibility</span>
                            </button>
                        </div>
                    </div>

                    <div class="flex items-center space-x-2.5 px-1 py-1">
                        <input class="w-3.5 h-3.5 rounded border-slate-300 bg-white text-primary focus:ring-primary/20" id="remember" type="checkbox"/>
                        <label class="text-[11px] md:text-xs text-on-surface-variant font-medium" for="remember">Tetap terautentikasi selama 24 jam</label>
                    </div>

                    <button id="login-btn" class="w-full primary-gradient text-white text-sm font-bold py-3 rounded-xl shadow-lg shadow-primary/30 hover:shadow-primary/40 hover:scale-[1.01] active:scale-[0.98] transition-all flex items-center justify-center space-x-2" type="submit">
                        <span class="material-symbols-outlined text-lg">login</span>
                        <span>Masuk</span>
                    </button>
                </form>

                <div class="mt-2 pt-5 border-t border-slate-100 text-center">
                    <div class="flex flex-col space-y-3">
                        <p class="text-[9px] md:text-[10px] text-on-surface-variant font-medium">BPS Live Chat Bot v1.0-stable</p>
                    </div>
                </div>
            </div>
            <div class="absolute -z-10 -bottom-2 -right-2 w-full h-full bg-slate-200/50 rounded-2xl blur-xl"></div>
        </div>
    </main>

    <script>
        const togglePassword = document.getElementById('toggle-password');
        const passwordInput = document.getElementById('password');

        togglePassword.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            togglePassword.innerHTML = type === 'password' 
                ? '<span class="material-symbols-outlined text-lg">visibility</span>' 
                : '<span class="material-symbols-outlined text-lg text-primary">visibility_off</span>';
        });

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault(); 
            const usernameVal = document.getElementById('username').value.trim();
            const passwordVal = document.getElementById('password').value;
            const btn = document.getElementById('login-btn');
            const errorMsg = document.getElementById('error-msg');
            const errorText = document.getElementById('error-text');

            btn.disabled = true;
            btn.innerHTML = '<span class="material-symbols-outlined text-lg animate-spin">autorenew</span><span>Memverifikasi...</span>';
            errorMsg.classList.add('hidden');

            try {
                const response = await fetch('http://localhost:3000/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: usernameVal, password: passwordVal })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('bps_admin_token', data.token);
                    btn.classList.replace('primary-gradient', 'bg-green-500');
                    btn.innerHTML = '<span class="material-symbols-outlined text-lg">check_circle</span><span>Akses Diberikan!</span>';
                    
                    setTimeout(() => {
                        window.location.href = '../protected/admin.html';
                    }, 1000);
                } else {
                    errorText.innerText = data.error || 'Autentikasi gagal!';
                    errorMsg.classList.remove('hidden');
                    btn.disabled = false;
                    btn.innerHTML = '<span class="material-symbols-outlined text-lg">login</span><span>Masuk</span>';
                }
            } catch (err) {
                errorText.innerText = 'Tidak dapat terhubung ke Server Sistem.';
                errorMsg.classList.remove('hidden');
                btn.disabled = false;
                btn.innerHTML = '<span class="material-symbols-outlined text-lg">login</span><span>Masuk</span>';
            }
        });

        window.addEventListener('DOMContentLoaded', () => {
            const existingToken = localStorage.getItem('bps_admin_token');
            if (existingToken) {
                window.location.href = '../protected/admin.html';
            }
        });
    </script>
</body>
</html>
