<!DOCTYPE html>
<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>BPS Messenger - Secure Admin Login</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "outline-variant": "#e2e8f0",
                        "surface-tint": "#f97316",
                        "on-surface-variant": "#64748b",
                        "surface-variant": "#f1f5f9",
                        "on-surface": "#0f172a",
                        "background": "#f8f6f6",
                        "primary": "#f97316",
                        "surface": "#f8f6f6",
                        "outline": "#94a3b8",
                    },
                    "fontFamily": {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Plus Jakarta Sans"],
                        "label": ["Plus Jakarta Sans"]
                    }
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8f6f6;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
        }

        .primary-gradient {
            background: linear-gradient(135deg, #fb923c 0%, #f97316 100%);
        }

        .bento-glow {
            background: radial-gradient(circle at 50% 0%, rgba(249, 115, 22, 0.03) 0%, transparent 70%);
        }

        .bg-dots {
            background-color: #f8f6f6;
            /* Memperjelas titik dengan radius 1.5px dan warna solid abu-abu */
            background-image: radial-gradient(#cbd5e1 1.5px, transparent 1.5px);
            background-size: 28px 28px;
        }
    </style>
</head>

<body
    class="bg-dots text-on-surface min-h-screen flex items-center justify-center overflow-x-hidden selection:bg-primary/20 selection:text-primary relative p-4 sm:p-8">
    <!-- Ornamen Background Responsif & Dot Pattern -->
    <div class="fixed inset-0 pointer-events-none overflow-hidden z-0">
        <!-- Glow Oranye Atas Kiri -->
        <div class="absolute -top-32 -left-32 w-[500px] h-[500px] rounded-full bg-primary/10 blur-[120px]"></div>
        <!-- Glow Biru BPS Bawah Kanan -->
        <div class="absolute -bottom-40 -right-40 w-[600px] h-[600px] rounded-full bg-blue-600/10 blur-[130px]"></div>
    </div>

    <main class="relative z-10 w-full max-w-[380px] flex flex-col items-center mt-[-5dvh]">
        <div class="w-full relative group">
            <!-- Box Utama Login -->
            <div
                class="glass-panel border border-slate-200 rounded-3xl p-6 sm:p-8 shadow-2xl relative overflow-hidden bento-glow w-full">

                <!-- Header / Logo di dalam card -->
                <div class="mb-6 pb-6 border-b border-slate-200/60 w-full flex justify-center">
                    <div class="flex items-center space-x-3 sm:space-x-4">
                        <div
                            class="p-2.5 sm:p-3 bg-primary rounded-xl sm:rounded-2xl shadow-lg shadow-primary/20 flex shrink-0">
                            <span class="material-symbols-outlined text-white text-2xl sm:text-3xl"
                                data-icon="monitoring" style="font-variation-settings: 'FILL' 1;">monitoring</span>
                        </div>
                        <div class="flex flex-col flex-1 mt-0.5">
                            <h1
                                class="text-primary font-extrabold tracking-tight text-xl sm:text-[22px] leading-none m-0">
                                BPS MONITOR</h1>
                            <span
                                class="text-[9px] sm:text-[10px] text-on-surface-variant font-bold uppercase tracking-widest mt-1">Live
                                Dashboard</span>
                        </div>
                    </div>
                </div>

                <div class="mb-6 text-center">
                    <h2 class="text-2xl sm:text-[26px] font-bold tracking-tight text-on-surface mb-1.5 mt-2">Admin Login
                    </h2>
                    <p class="text-on-surface-variant text-[11px] sm:text-xs px-2">Autentikasi keamanan akses
                        Administrasi BPS.</p>
                </div>

                <form id="login-form" class="space-y-4 sm:space-y-5">

                    <div id="error-msg"
                        class="hidden bg-red-50 border border-red-200 text-red-600 text-xs sm:text-sm font-bold px-4 py-3 rounded-xl flex items-start gap-2 text-left">
                        <span class="material-symbols-outlined text-[18px] shrink-0 mt-0.5">error</span>
                        <span id="error-text" class="flex-1">Username atau password salah!</span>
                    </div>

                    <div class="space-y-1.5">
                        <label
                            class="block text-[11px] font-bold text-on-surface-variant uppercase tracking-widest ml-1"
                            for="username">Username</label>
                        <div class="relative group">
                            <div class="absolute left-4 top-1/2 -translate-y-1/2 pointer-events-none">
                                <span class="material-symbols-outlined text-outline text-[18px]">alternate_email</span>
                            </div>
                            <input id="username" required
                                class="w-full bg-slate-50 border border-slate-200 rounded-2xl py-3 pl-11 pr-4 text-[13px] sm:text-sm text-on-surface placeholder-outline focus:ring-2 focus:ring-primary/20 focus:border-primary/50 focus:bg-white transition-all outline-none"
                                placeholder="Masukkan username" type="text" autocomplete="off" />
                        </div>
                    </div>

                    <div class="space-y-1.5">
                        <label
                            class="block text-[11px] font-bold text-on-surface-variant uppercase tracking-widest ml-1"
                            for="password">Password</label>
                        <div class="relative group">
                            <div class="absolute left-4 top-1/2 -translate-y-1/2 pointer-events-none">
                                <span class="material-symbols-outlined text-outline text-[18px]">lock</span>
                            </div>
                            <input id="password" required
                                class="w-full bg-slate-50 border border-slate-200 rounded-2xl py-3 pl-11 pr-11 text-[13px] sm:text-sm text-on-surface placeholder-outline focus:ring-2 focus:ring-primary/20 focus:border-primary/50 focus:bg-white transition-all outline-none"
                                placeholder="••••••••••••" type="password" />
                            <button id="toggle-password"
                                class="absolute right-2 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-colors p-2 rounded-full focus:outline-none focus:bg-slate-200/50"
                                type="button">
                                <span class="material-symbols-outlined text-[18px]">visibility</span>
                            </button>
                        </div>
                    </div>

                    <div class="flex items-start sm:items-center space-x-2.5 px-1 pt-0.5">
                        <input
                            class="w-3.5 h-3.5 mt-0.5 sm:mt-0 rounded border-slate-300 bg-white text-primary focus:ring-primary/30 shrink-0 cursor-pointer"
                            id="remember" type="checkbox" />
                        <label
                            class="text-[11px] sm:text-xs text-on-surface-variant font-medium cursor-pointer flex-1 leading-tight"
                            for="remember">Biarkan saya tetap masuk selama 24 jam ke depan.</label>
                    </div>

                    <div class="pt-2">
                        <button id="login-btn"
                            class="w-full primary-gradient text-white text-[13px] sm:text-sm font-bold py-3.5 rounded-2xl shadow-lg shadow-primary/30 hover:shadow-primary/40 hover:-translate-y-0.5 active:translate-y-0 active:scale-[0.98] transition-all flex items-center justify-center space-x-2"
                            type="submit">
                            <span class="material-symbols-outlined text-[18px]">login</span>
                            <span>Masuk ke Dashboard</span>
                        </button>
                    </div>

                    <div class="text-center pt-2 pb-1">
                        <p
                            class="inline-flex items-center space-x-1.5 text-[9px] sm:text-[10px] text-slate-400 font-semibold tracking-widest uppercase">
                            <span class="material-symbols-outlined text-[12px]">verified_user</span>
                            <span>BPS Live Chat Bot v1.0-stable</span>
                        </p>
                    </div>
                </form>
            </div>

            <!-- Shadow dekoratif di belakang panel -->
            <div class="absolute -z-10 -bottom-3 -right-3 w-[95%] h-[95%] bg-slate-200/50 rounded-[30px] blur-xl"></div>
        </div>
    </main>

    <script>
        const togglePassword = document.getElementById('toggle-password');
        const passwordInput = document.getElementById('password');

        togglePassword.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            togglePassword.innerHTML = type === 'password'
                ? '<span class="material-symbols-outlined text-lg">visibility</span>'
                : '<span class="material-symbols-outlined text-lg text-primary">visibility_off</span>';
        });

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const usernameVal = document.getElementById('username').value.trim();
            const passwordVal = document.getElementById('password').value;
            const btn = document.getElementById('login-btn');
            const errorMsg = document.getElementById('error-msg');
            const errorText = document.getElementById('error-text');

            btn.disabled = true;
            btn.innerHTML = '<span class="material-symbols-outlined text-lg animate-spin">autorenew</span><span>Memverifikasi...</span>';
            errorMsg.classList.add('hidden');

            try {
                const response = await fetch('http://localhost:3000/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: usernameVal, password: passwordVal })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('bps_admin_token', data.token);
                    btn.classList.replace('primary-gradient', 'bg-green-500');
                    btn.innerHTML = '<span class="material-symbols-outlined text-lg">check_circle</span><span>Akses Diberikan!</span>';

                    setTimeout(() => {
                        window.location.href = '/admin';
                    }, 1000);
                } else {
                    errorText.innerText = data.error || 'Autentikasi gagal!';
                    errorMsg.classList.remove('hidden');
                    btn.disabled = false;
                    btn.innerHTML = '<span class="material-symbols-outlined text-lg">login</span><span>Masuk</span>';
                }
            } catch (err) {
                errorText.innerText = 'Tidak dapat terhubung ke Server Sistem.';
                errorMsg.classList.remove('hidden');
                btn.disabled = false;
                btn.innerHTML = '<span class="material-symbols-outlined text-lg">login</span><span>Masuk</span>';
            }
        });

        window.addEventListener('DOMContentLoaded', () => {
            const existingToken = localStorage.getItem('bps_admin_token');
            if (existingToken) {
                window.location.href = '/admin';
            }
        });
    </script>
</body>

</html>
