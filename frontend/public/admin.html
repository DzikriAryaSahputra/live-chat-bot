<!DOCTYPE html>
<html class="h-full" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>BPS Live Chat Monitor - Admin Dashboard</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />

    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec5b13",
                        "background-light": "#f8f6f6",
                        "background-dark": "#0f172a",
                        "slate-custom": "#1e293b",
                        "navy-deep": "#0f172a",
                        "bot-cyan": "#22d3ee",
                        "admin-blue": "#3b82f6",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "Public Sans", "sans-serif"]
                    },
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        .dark .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #334155;
        }

        .dark .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #475569;
        }
    </style>
</head>

<body
    class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 h-full overflow-hidden relative">

    <div id="toast-container" class="fixed top-6 right-6 z-[100] flex flex-col gap-3 pointer-events-none"></div>

    <div class="flex h-full w-full overflow-hidden">

        <main
            class="flex-shrink-0 bg-white dark:bg-slate-custom border-r border-slate-200 dark:border-slate-800 flex flex-col w-72 lg:w-80 z-20 shadow-xl">
            <div class="p-6 pb-2 flex items-center gap-3">
                <div class="bg-primary p-2 rounded-xl flex items-center justify-center shadow-md">
                    <span class="material-symbols-outlined text-white">monitoring</span>
                </div>
                <div>
                    <h1 class="text-sm font-bold tracking-tight uppercase text-primary">BPS Monitor</h1>
                    <p class="text-[10px] text-slate-500 font-semibold uppercase tracking-widest">Live Dashboard</p>
                </div>
            </div>

            <div class="p-6 border-b border-slate-200 dark:border-slate-800">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-xl font-bold">Chats</h2>
                    <span id="active-count"
                        class="bg-primary/10 text-primary text-[10px] font-bold px-2 py-1 rounded-full">0 ACTIVE</span>
                </div>
                <div class="relative">
                    <span
                        class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">search</span>
                    <input
                        class="w-full bg-slate-100 dark:bg-slate-800 border-none rounded-xl py-2.5 pl-10 pr-4 text-sm focus:ring-2 focus:ring-primary/50 transition-all placeholder:text-slate-500"
                        placeholder="Cari ID Warga..." type="text" />
                </div>
            </div>

            <div class="flex-1 overflow-y-auto custom-scrollbar" id="user-list">
                <div class="p-8 text-center text-slate-400 text-sm">Menunggu koneksi warga...</div>
            </div>

            <div class="mt-auto p-4 border-t border-slate-200 dark:border-slate-800">
                <div
                    class="p-3 bg-slate-100 dark:bg-slate-800/50 rounded-xl hover:bg-slate-200 transition-colors cursor-pointer">
                    <div class="flex items-center gap-3">
                        <div
                            class="w-9 h-9 rounded-full bg-admin-blue text-white flex items-center justify-center overflow-hidden shadow-sm">
                            <span class="material-symbols-outlined text-sm">support_agent</span>
                        </div>
                        <div class="flex-1 min-w-0">
                            <p class="text-xs font-bold truncate">Admin BPS Jambi</p>
                            <p class="text-[10px] text-green-500 font-medium">Online (Connected)</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <section class="flex-1 flex flex-col bg-slate-50 dark:bg-navy-deep relative overflow-hidden">
            <header
                class="h-20 bg-white/80 dark:bg-slate-custom/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800 flex items-center justify-between px-8 z-10 shadow-sm">
                <div class="flex items-center gap-4">
                    <div class="relative">
                        <div class="w-10 h-10 rounded-full bg-slate-200 dark:bg-slate-700 flex items-center justify-center text-slate-500 font-bold overflow-hidden shadow-inner"
                            id="header-avatar">?</div>
                        <div
                            class="absolute -bottom-0.5 -right-0.5 w-3 h-3 bg-green-500 border-2 border-white dark:border-slate-custom rounded-full">
                        </div>
                    </div>
                    <div>
                        <h2 class="font-bold text-base" id="active-user-title">Pilih Obrolan</h2>
                        <div class="flex items-center gap-2">
                            <span class="w-1.5 h-1.5 rounded-full bg-green-500"></span>
                            <span class="text-[10px] font-medium text-slate-500 uppercase tracking-wide">Status:
                                Menunggu</span>
                        </div>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <button onclick="deleteChatHistory()"
                        class="p-2 text-slate-500 hover:text-red-500 hover:bg-red-50 dark:hover:bg-slate-800 rounded-lg transition-all"
                        title="Hapus Riwayat Chat Permanen">
                        <span class="material-symbols-outlined">delete_sweep</span>
                    </button>
                </div>
            </header>

            <div class="flex-1 overflow-y-auto p-4 md:p-8 flex flex-col custom-scrollbar" id="chat-box">
                <div class="m-auto text-center flex flex-col items-center opacity-50">
                    <span class="material-symbols-outlined text-6xl mb-2 text-slate-400">forum</span>
                    <p class="text-slate-500 font-medium">Pilih warga dari daftar di sebelah kiri untuk mulai mengobrol.
                    </p>
                </div>
            </div>

            <div class="p-6 bg-transparent">
                <div
                    class="max-w-4xl mx-auto bg-white dark:bg-slate-custom rounded-2xl shadow-xl shadow-slate-900/10 border border-slate-200 dark:border-slate-800 p-2 flex items-center gap-2">
                    <input
                        class="flex-1 bg-transparent border-none focus:ring-0 text-sm py-2 px-4 placeholder:text-slate-400"
                        id="admin-input" placeholder="Ketik pesan... (Ketik /selesai untuk kembalikan ke bot)"
                        type="text" autocomplete="off" />
                    <button
                        class="bg-primary text-white p-2.5 rounded-xl shadow-lg hover:bg-orange-600 hover:scale-105 active:scale-95 transition-all flex items-center justify-center"
                        id="send-btn">
                        <span class="material-symbols-outlined">send</span>
                    </button>
                </div>
            </div>
        </section>
    </div>

    <script src="http://localhost:3000/socket.io/socket.io.js"></script>
    <script>
        const socket = io('http://localhost:3000');
        let activeSenderId = null;
        let activeUsersList = [];
        let unreadCounts = {};

        // 👇 VARIABEL UNTUK MENYIMPAN DAFTAR WARGA YANG BUTUH BANTUAN 👇
        let needsHelpSet = new Set();

        const userListEl = document.getElementById('user-list');
        const chatBoxEl = document.getElementById('chat-box');
        const adminInput = document.getElementById('admin-input');
        const sendBtn = document.getElementById('send-btn');
        const activeUserTitle = document.getElementById('active-user-title');
        const activeCount = document.getElementById('active-count');
        const headerAvatar = document.getElementById('header-avatar');

        // Suara Notifikasi Biasa & Suara Alarm Darurat
        const notifSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3');
        const alertSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3'); // Suara Telepon/Alarm

        function formatTime(dateString) {
            const date = dateString ? new Date(dateString) : new Date();
            return date.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
        }

        // ==========================================
        // FUNGSI POP-UP ALERT (TOAST NOTIFICATION)
        // ==========================================
        function showToastAlert(title, message) {
            const toast = document.createElement('div');
            // Desain Toast melayang dari kanan
            toast.className = 'bg-white border-l-4 border-red-500 shadow-2xl rounded-xl p-4 w-80 transform transition-all duration-300 translate-x-full opacity-0 flex items-start gap-3 pointer-events-auto';
            toast.innerHTML = `
                <div class="bg-red-100 p-2 rounded-full text-red-500 shrink-0">
                    <span class="material-symbols-outlined text-xl animate-bounce">ring_volume</span>
                </div>
                <div>
                    <h4 class="text-sm font-bold text-slate-800">${title}</h4>
                    <p class="text-xs text-slate-500 mt-0.5 leading-relaxed">${message}</p>
                </div>
            `;
            document.getElementById('toast-container').appendChild(toast);

            // Animasi masuk
            setTimeout(() => { toast.classList.remove('translate-x-full', 'opacity-0'); }, 50);

            // Auto hapus setelah 6 detik
            setTimeout(() => {
                toast.classList.add('translate-x-full', 'opacity-0');
                setTimeout(() => toast.remove(), 300);
            }, 6000);
        }

        socket.on('user_list', (users) => {
            activeUsersList = users;
            renderUserList();
        });

        function renderUserList() {
            userListEl.innerHTML = '';
            activeCount.innerText = `${activeUsersList.length} ACTIVE`;

            if (activeUsersList.length === 0) {
                userListEl.innerHTML = '<div class="p-8 text-center text-slate-400 text-sm">Tidak ada warga aktif saat ini.</div>';
                return;
            }

            activeUsersList.forEach(userId => {
                const isActive = activeSenderId === userId;
                const avatarLetter = userId.substring(0, 2).toUpperCase();

                const unread = unreadCounts[userId] || 0;
                const isNeedHelp = needsHelpSet.has(userId);

                // Badge Unread (Biru/Orange)
                const unreadBadge = unread > 0
                    ? `<span class="bg-primary text-white text-[10px] font-bold px-2 py-0.5 rounded-full shadow-md animate-pulse">${unread} Baru</span>`
                    : '';

                // Badge Bantuan Darurat (Merah)
                const helpBadge = isNeedHelp
                    ? `<span class="bg-red-500 text-white text-[9px] font-bold px-1.5 py-0.5 rounded uppercase shadow-sm animate-pulse ml-2 whitespace-nowrap">Butuh Bantuan</span>`
                    : '';

                // Jika butuh bantuan, background list sedikit merah. Jika biasa, ikut aturan standar.
                let bgClass = isActive ? 'border-l-primary bg-primary/5' : 'border-l-transparent';
                if (isNeedHelp && !isActive) bgClass = 'border-l-red-500 bg-red-50';

                const div = document.createElement('div');
                div.className = `p-4 border-b border-slate-100 hover:bg-slate-50 cursor-pointer transition-colors border-l-4 ${bgClass}`;
                div.onclick = () => selectUser(userId);

                div.innerHTML = `
                    <div class="flex items-start gap-3">
                        <div class="relative shrink-0">
                            <div class="w-12 h-12 rounded-full ${isNeedHelp ? 'bg-red-200 text-red-700' : 'bg-slate-200 text-slate-600'} overflow-hidden flex items-center justify-center font-bold shadow-inner">
                                ${avatarLetter}
                            </div>
                            <div class="absolute bottom-0 right-0 w-3.5 h-3.5 ${isNeedHelp ? 'bg-red-500 animate-ping' : 'bg-green-500'} border-2 border-white rounded-full"></div>
                        </div>
                        <div class="flex-1 min-w-0 flex flex-col justify-center mt-1">
                            <div class="flex items-center justify-between mb-1">
                                <div class="flex items-center truncate">
                                    <h3 class="text-sm font-bold truncate ${unread > 0 || isNeedHelp ? 'text-slate-900' : 'text-slate-600'}">${userId}</h3>
                                    ${helpBadge}
                                </div>
                                ${unreadBadge}
                            </div>
                            <p class="text-xs ${unread > 0 || isNeedHelp ? 'text-slate-800 font-bold' : 'text-slate-500'} line-clamp-1 italic">
                                ${isNeedHelp ? '🚨 Menunggu respon Admin!' : (unread > 0 ? 'Ada pesan baru!' : 'Ketuk untuk melihat obrolan')}
                            </p>
                        </div>
                    </div>
                `;
                userListEl.appendChild(div);
            });
        }

        async function selectUser(userId) {
            activeSenderId = userId;
            activeUserTitle.innerText = userId;
            headerAvatar.innerText = userId.substring(0, 2).toUpperCase();

            unreadCounts[userId] = 0;
            renderUserList();

            chatBoxEl.innerHTML = '';

            try {
                const response = await fetch(`http://localhost:3000/api/chat/history/${userId}`);
                const history = await response.json();

                if (history.length === 0) {
                    chatBoxEl.innerHTML = '<div class="m-auto text-slate-400 text-sm">Belum ada obrolan.</div>';
                } else {
                    history.forEach(chat => {
                        appendMessage(chat.sender_type, chat.message, chat.created_at);
                    });
                }
            } catch (error) {
                console.error('Gagal mengambil riwayat:', error);
            }
        }

        // ==========================================
        // FUNGSI MENERIMA PESAN (DENGAN SMART ALERT)
        // ==========================================
        socket.on('receive_message', (data) => {

            // 👇 LOGIKA SMART ALERT: Cek jika ini pesan dari Bot yang mengalihkan ke Admin 👇
            if (data.senderType === 'bot' && data.message.includes('meneruskan pesan Anda ke petugas')) {
                needsHelpSet.add(data.senderId); // Tambahkan ke daftar butuh bantuan

                // Munculkan Pop-up Toast
                showToastAlert('🚨 Panggilan Darurat!', `Warga <b>${data.senderId}</b> menekan tombol "Chat Langsung" dan menunggu respon Anda.`);

                // Putar suara Alarm
                alertSound.play().catch(e => console.log('Audio diblokir browser'));
                renderUserList(); // Update sidebar agar badge merah muncul
            }

            // Tampilkan pesan di layar obrolan jika admin sedang membuka chat tersebut
            if (activeSenderId === data.senderId) {
                if (chatBoxEl.innerHTML.includes('Belum ada obrolan')) chatBoxEl.innerHTML = '';
                let type = data.senderType === 'warga' ? 'user' : data.senderType;
                appendMessage(type, data.message, new Date());
            } else {
                // Notifikasi pesan biasa
                if (data.senderType === 'warga') {
                    if (!unreadCounts[data.senderId]) unreadCounts[data.senderId] = 0;
                    unreadCounts[data.senderId]++;

                    // Putar suara notifikasi biasa HANYA JIKA bukan panggilan darurat
                    if (!needsHelpSet.has(data.senderId)) {
                        notifSound.play().catch(e => console.log('Audio diblokir browser'));
                    }
                    renderUserList();
                }
            }
        });

        function appendMessage(senderType, text, timestamp) {
            const timeStr = formatTime(timestamp);
            const div = document.createElement('div');

            if (senderType === 'user' || senderType === 'warga') {
                div.className = 'flex flex-col items-start max-w-[85%] md:max-w-[70%] mb-4';
                div.innerHTML = `
                    <div class="flex items-center gap-2 mb-1 pl-1">
                        <span class="text-[10px] font-bold text-slate-500 uppercase tracking-wider">Warga</span>
                        <span class="text-[10px] text-slate-400">${timeStr}</span>
                    </div>
                    <div class="bg-white p-3.5 rounded-2xl rounded-tl-none shadow-sm text-[14px] leading-relaxed border border-slate-200 text-slate-700 whitespace-pre-line">
                        ${text}
                    </div>
                `;
            } else if (senderType === 'bot') {
                div.className = 'flex flex-col items-start max-w-[85%] md:max-w-[70%] mb-4';
                div.innerHTML = `
                    <div class="flex items-center gap-2 mb-1 pl-1">
                        <span class="text-[10px] font-bold text-bot-cyan flex items-center gap-1 uppercase tracking-wider">
                            <span class="material-symbols-outlined text-[12px]">smart_toy</span> Bot Asisten
                        </span>
                        <span class="text-[10px] text-slate-400">${timeStr}</span>
                    </div>
                    <div class="bg-bot-cyan/10 border border-bot-cyan/30 text-slate-800 p-3.5 rounded-2xl rounded-tl-none shadow-sm text-[14px] leading-relaxed whitespace-pre-line">
                        ${text}
                    </div>
                `;
            } else {
                div.className = 'flex flex-col items-end self-end max-w-[85%] md:max-w-[70%] mb-4 ml-auto';
                div.innerHTML = `
                    <div class="flex items-center gap-2 mb-1 pr-1">
                        <span class="text-[10px] text-slate-400">${timeStr}</span>
                        <span class="text-[10px] font-bold text-admin-blue uppercase tracking-wider">Anda (Admin)</span>
                    </div>
                    <div class="bg-admin-blue text-white p-3.5 rounded-2xl rounded-tr-none shadow-md shadow-admin-blue/20 text-[14px] leading-relaxed whitespace-pre-line">
                        ${text}
                    </div>
                `;
            }

            chatBoxEl.appendChild(div);
            chatBoxEl.scrollTop = chatBoxEl.scrollHeight;
        }

        async function deleteChatHistory() {
            if (!activeSenderId) {
                alert("Silakan pilih warga terlebih dahulu!");
                return;
            }

            const konfirmasi = confirm(`Tindakan ini akan MENGHAPUS SELURUH OBROLAN DENGAN ${activeSenderId} secara permanen dari database. Anda yakin?`);

            if (konfirmasi) {
                try {
                    const response = await fetch(`http://localhost:3000/api/chat/history/${activeSenderId}`, { method: 'DELETE' });

                    if (response.ok) {
                        chatBoxEl.innerHTML = `
                            <div class="m-auto text-center flex flex-col items-center opacity-50">
                                <span class="material-symbols-outlined text-6xl mb-2 text-green-500">check_circle</span>
                                <p class="text-slate-500 font-medium">Riwayat obrolan berhasil dihapus.</p>
                            </div>`;

                        delete unreadCounts[activeSenderId];
                        needsHelpSet.delete(activeSenderId); // Hapus status darurat
                    }
                } catch (error) {
                    console.error('Gagal menghapus riwayat:', error);
                    alert("Terjadi kesalahan saat menghubungi server untuk menghapus chat.");
                }
            }
        }

        function sendMessage() {
            if (!activeSenderId) {
                alert("Silakan pilih warga dari daftar sebelah kiri terlebih dahulu!");
                return;
            }

            const text = adminInput.value.trim();
            if (!text) return;

            socket.emit('admin_message', { targetSenderId: activeSenderId, message: text });

            if (text !== '/selesai') {
                appendMessage('admin', text, new Date());
            }

            // 👇 HILANGKANG STATUS DARURAT KARENA ADMIN SUDAH MERESPONS 👇
            if (needsHelpSet.has(activeSenderId)) {
                needsHelpSet.delete(activeSenderId);
                renderUserList(); // Update sidebar agar label merahnya hilang
            }

            adminInput.value = '';
        }

        sendBtn.addEventListener('click', sendMessage);
        adminInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>

</html>
